<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる台風 - Live Board</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 🛠️ 指定のDINフォントをローカルからロード */
    @font-face {
      font-family: 'DIN 2014 DB';
      src: url('assets/typhoon/DIN 2014 DB.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      width: 1920px; 
      height: 1080px; 
      overflow: hidden; 
      background: #111317; 
      color: #ffffff; 
      font-family: 'Noto Sans JP', sans-serif; 
    }

    /* 16:9 画面サイズを完全にロック */
    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* 🗺️ 背面：文字・境界線が一切ないクリアな地図レイヤー */
    #map {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background: #111317;
    }

    /* 🎬 前面：グラフィック・データ送出オーバーレイレイヤー */
    .ui-overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      z-index: 2;
      pointer-events: none; /* 地図の自動フィット等を邪魔しない */
    }

    /* 🖼️ 16:9 フルサイズ画像を完全にぴったり重ね合わせる共通スタイル */
    .full-screen-asset {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      object-fit: contain;
      pointer-events: none;
    }

    /* 📊 データテキスト配置専用のコンテナ（右上の黒い座布団の位置に完全に合わせる） */
    .typhoon-data-container {
      position: absolute;
      /* 💡 template.png内の黒ボックスの位置（ズレている場合はここを微調整） */
      top: 36px; 
      right: 54px; 
      width: 476px; 
      height: 352px;
      pointer-events: none;
      display: none; /* データが正常に読み込まれるまで非表示 */
    }

    /* 🔢 台風の号数（DIN 2014 DBを適用） */
    .typhoon-number-value {
      position: absolute;
      top: -2px;          /* 上下位置調整 */
      left: 145px;        /* 「台風」と「号」の間のX座標 */
      width: 110px;
      text-align: center;
      font-family: 'DIN 2014 DB', sans-serif;
      font-size: 78px;
      color: #ffffff;
      line-height: 1;
    }

    /* 🏷️ アジア名（グレーの帯エリアの中央） */
    .typhoon-name-value {
      position: absolute;
      top: 94px;         /* グレーの帯の縦中心 */
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.05em;
    }

    /* 📋 パラメータ（位置・気圧・風速・進路）の共通スタイル値（右寄せ） */
    .param-value {
      position: absolute;
      right: 30px;       /* 右端からの余白 */
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      text-align: right;
    }

    /* パラメータ内の「数値」にDINフォントを美しく適用 */
    .num-din {
      font-family: 'DIN 2014 DB', sans-serif;
      font-size: 32px;
      margin-right: 4px;
    }

    /* 各行の高さ（Y座標）の指定（template.pngの行間隔にフィットさせます） */
    #t-location { top: 144px; }
    #t-pressure { top: 194px; }
    #t-wind     { top: 244px; }
    #t-direction{ top: 294px; }

    /* エラー・未発表時のオーバーレイ */
    .info-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 700;
      background: rgba(0,0,0,0.85);
      padding: 20px 50px;
      border-radius: 8px;
      z-index: 100;
      display: none;
    }

    /* 不要なマップUIを根こそぎ非表示 */
    .leaflet-control-attribution, .leaflet-control-zoom {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div id="map"></div>

    <div class="ui-overlay-layer">
      
      <img src="assets/typhoon/title.png" class="full-screen-asset" alt="Title Layer">
      <img src="assets/typhoon/template.png" class="full-screen-asset" alt="Template Layer">

      <div class="info-overlay" id="info-message">台風情報は発表されていません</div>

      <div class="typhoon-data-container" id="telop-container">
        
        <div class="typhoon-number-value" id="t-num">--</div>
        <div class="typhoon-name-value" id="t-name">---</div>
        
        <div class="param-value" id="t-location">---</div>
        <div class="param-value" id="t-pressure"><span class="num-din" id="v-pressure">---</span>hPa</div>
        <div class="param-value" id="t-wind"><span class="num-din" id="v-wind">---</span>m/s</div>
        <div class="param-value" id="t-direction">---</div>

      </div>
    </div>
  </div>

  <script>
    const TYPHOON_LIST_URL = "https://www.jma.go.jp/bosai/information/data/typhoon.json";
    const TYPHOON_DETAIL_BASE = "https://www.jma.go.jp/bosai/typhoon/data/";

    let map;

    function initMap() {
      // テレビの固定画面として最高精度を保つため、ドラッグやズームなどの手動操作を完全ロック
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        touchZoom: false
      }).setView([25.0, 135.0], 5);

      // 💡 地名、都市名、道路、国境線が「一切入っていない」完全無地のダークマップ
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
        maxZoom: 10,
        minZoom: 3
      }).addTo(map);
    }

    async function loadTyphoonData() {
      const infoMsg = document.getElementById("info-message");

      try {
        console.log("そらしる台風：最新データをシーク中...");
        const listResponse = await fetch(`${TYPHOON_LIST_URL}?t=${Date.now()}`);
        const typhoonList = await listResponse.json();

        if (!typhoonList || typhoonList.length === 0) {
          infoMsg.innerText = "現在、発表中の台風情報はありません。";
          infoMsg.style.display = "block";
          return;
        }

        const currentTyphoon = typhoonList[0];
        const eventId = currentTyphoon.eventId;
        
        if (!eventId) {
          infoMsg.innerText = "台風データのイベントIDが見つかりません。";
          infoMsg.style.display = "block";
          return;
        }

        const detailUrl = `${TYPHOON_DETAIL_BASE}${eventId}/specifications.json?t=${Date.now()}`;
        const detailResponse = await fetch(detailUrl);
        const specifications = await detailResponse.json();

        // テロップ描画 ＆ マッププロット
        parseAndRenderTelop(specifications);
        drawTyphoonOnMap(specifications);

      } catch (error) {
        console.error("台風データの処理中にエラーが発生しました:", error);
        infoMsg.innerText = "台風データの取得エラーが発生しました。";
        infoMsg.style.display = "block";
      }
    }

    // 取得データをパースし、template.pngの空きスペースに超精密に流し込む
    function parseAndRenderTelop(dataArray) {
      const telopBox = document.getElementById("telop-container");
      if (!dataArray || dataArray.length < 2) return;

      // 1. 基本情報の抽出
      const titleBlock = dataArray[0];
      let rawNumber = titleBlock.typhoonNumber ? String(titleBlock.typhoonNumber) : "--";
      if (rawNumber.length === 4) {
        rawNumber = parseInt(rawNumber.substring(2, 4), 10); // "2606" -> 6
      }
      const typhoonName = (titleBlock.name && titleBlock.name.jp) ? titleBlock.name.jp : "無名";

      // 2. 現在の実況ブロックを取得
      const analysisBlock = dataArray.find(b => b.part === "実況" || (b.part && b.part.jp === "実況")) || dataArray[1];
      
      const location = analysisBlock.location || "---";
      const pressure = analysisBlock.pressure || "---";
      const maxWind = (analysisBlock.maximumWind && analysisBlock.maximumWind.sustained && analysisBlock.maximumWind.sustained["m/s"]) ? analysisBlock.maximumWind.sustained["m/s"] : "---";

      // 3. 進路（進行方向と速度）の整形
      let course = analysisBlock.course || "";
      let speedNote = (analysisBlock.speed && analysisBlock.speed.note && analysisBlock.speed.note.jp) ? analysisBlock.speed.note.jp : "";
      let speedKm = (analysisBlock.speed && analysisBlock.speed["km/h"]) ? `${analysisBlock.speed["km/h"]}km/h` : "";
      
      let directionSpeed = "---";
      if (course || speedNote || speedKm) {
        directionSpeed = `${course} ${speedNote || speedKm}`.trim();
      }

      // 4. HTMLの各データエリアを書き換え
      document.getElementById("t-num").textContent = rawNumber;
      document.getElementById("t-name").textContent = typhoonName;
      document.getElementById("t-location").textContent = location;
      document.getElementById("v-pressure").textContent = pressure;
      document.getElementById("v-wind").textContent = maxWind;
      document.getElementById("t-direction").textContent = directionSpeed;

      // 描画レイヤーをアクティブ化
      telopBox.style.display = "block";
    }

    // 地図上に台風の進路、予報円をスマートに描画
    function drawTyphoonOnMap(dataArray) {
      if (!dataArray || dataArray.length < 2) return;

      const latLngs = [];

      dataArray.forEach((block) => {
        if (block.part === "title" || !block.position || !block.position.deg) return;

        const lat = block.position.deg[0];
        const lng = block.position.deg[1];
        latLngs.push([lat, lng]);

        const isAnalysis = (block.part === "実況" || (block.part && block.part.jp === "実況"));

        if (isAnalysis) {
          // 【現在地マーク】（ソリッドな赤サークル）
          L.circleMarker([lat, lng], {
            radius: 7,
            color: '#ff3b30',
            fillColor: '#ff3b30',
            fillOpacity: 1,
            weight: 2
          }).addTo(map);

          // 【暴風域・強風域】
          if (block.galeWarning && block.galeWarning[0] && block.galeWarning[0].range) {
            const radiusKm = block.galeWarning[0].range.km;
            L.circle([lat, lng], {
              radius: radiusKm * 1000,
              color: '#ff9500',
              weight: 1.5,
              fillColor: '#ff9500',
              fillOpacity: 0.12
            }).addTo(map);
          }
        } else {
          // 【予報円】（テレビのグラフィックライクな白破線サークル）
          if (block.probabilityCircleRadius && block.probabilityCircleRadius.km) {
            const radiusKm = block.probabilityCircleRadius.km;
            
            L.circle([lat, lng], {
              radius: radiusKm * 1000,
              color: '#ffffff',
              weight: 1.5,
              dashArray: '5, 5',
              fillColor: '#ffffff',
              fillOpacity: 0.03
            }).addTo(map);

            L.circleMarker([lat, lng], {
              radius: 2.5,
              color: '#ffffff',
              fillColor: '#ffffff',
              fillOpacity: 1
            }).addTo(map);
          }
        }
      });

      // 進路を結ぶ細身でシャープな予想ライン（白）
      if (latLngs.length > 1) {
        L.polyline(latLngs, {
          color: '#ffffff',
          weight: 3,
          opacity: 0.7
        }).addTo(map);
      }

      // 右上の template.png の背後に台風情報が隠れないよう自動カメラ調整
      if (latLngs.length > 0) {
        const bounds = L.latLngBounds(latLngs);
        // パディングを大きく取ることで、右上のテロップ枠を避けた絶妙な位置に自動フォーカスします
        map.fitBounds(bounds, { padding: [260, 260] });
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      loadTyphoonData();
    });
  </script>
</body>
</html>
