<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる台風</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #111317; color: #ffffff; font-family: 'Noto Sans JP', sans-serif; }

    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* 背景：台風用の広域マップ */
    .base-container {
      width: 100%;
      height: 100%;
      background: #1c1f24 url('assets/typhoon/map_bg.jpg') no-repeat center/cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 台風の進路や予報円を描画するためのキャンバスレイヤー */
    #typhoon-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      z-index: 1;
      pointer-events: none;
    }

    /* 左側のテレビ風台風ステータステルプ */
    .typhoon-telop-box {
      position: absolute;
      top: 80px;
      left: 60px;
      width: 540px;
      background: rgba(15, 20, 30, 0.85);
      border-left: 12px solid #ff3b30; /* 台風の警戒感を表す赤帯 */
      border-radius: 4px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .telop-header {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.05em;
      border-bottom: 3px solid rgba(255,255,255,0.2);
      padding-bottom: 15px;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
      align-items: baseline;
    }
    
    .typhoon-number {
      color: #ffcc00; /* 号数は目立つ黄色 */
      font-size: 48px;
      font-weight: 900;
      margin-right: 15px;
    }

    .typhoon-name {
      font-size: 32px;
      color: #ffffff;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .status-label {
      color: #aaaaaa;
      font-weight: 500;
    }

    .status-value {
      font-weight: 700;
      font-size: 26px;
    }
    
    .font-roboto {
      font-family: 'Roboto', sans-serif;
      font-size: 32px;
      color: #ffffff;
      font-weight: 700;
    }

    /* 右上のヘッダータグ */
    .title-tag {
      position: absolute;
      top: 40px;
      right: 60px;
      background: #ff3b30;
      color: white;
      font-weight: 900;
      font-size: 28px;
      padding: 8px 25px;
      border-radius: 4px;
      letter-spacing: 0.1em;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* エラー通知や台風未発生時の表示 */
    .info-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 700;
      background: rgba(0,0,0,0.8);
      padding: 20px 50px;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div class="base-container">
      
      <div class="title-tag">台風情報</div>

      <div class="info-overlay" id="info-message">台風情報は発表されていません</div>

      <div class="typhoon-telop-box" id="telop-container" style="display: none;">
        <div class="telop-header">
          <span class="typhoon-number" id="t-num">台風--号</span>
          <span class="typhoon-name" id="t-name">---</span>
        </div>
        
        <div class="status-row">
          <span class="status-label">強さ</span>
          <span class="status-value" id="t-intensity">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">存在地域</span>
          <span class="status-value" id="t-location">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">進行方向・速さ</span>
          <span class="status-value" id="t-direction">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">中心気圧</span>
          <span class="status-value"><span class="font-roboto" id="t-pressure">---</span> hPa</span>
        </div>
        <div class="status-row">
          <span class="status-label">最大風速</span>
          <span class="status-value"><span class="font-roboto" id="t-wind">---</span> m/s</span>
        </div>
        <div class="status-row">
          <span class="status-label">最大瞬間風速</span>
          <span class="status-value"><span class="font-roboto" id="t-gust">---</span> m/s</span>
        </div>
      </div>

      <canvas id="typhoon-canvas" width="1920" height="1080"></canvas>

    </div>
  </div>

  <script>
    const TYPHOON_LIST_URL = "https://www.jma.go.jp/bosai/information/data/typhoon.json";
    const TYPHOON_DETAIL_BASE = "https://www.jma.go.jp/bosai/typhoon/data/";

    async function loadTyphoonData() {
      const infoMsg = document.getElementById("info-message");

      try {
        console.log("そらしる台風：台風リストの同期を開始...");
        
        // 1. 現在発生している台風のリスト(eventId)を取得
        const listResponse = await fetch(`${TYPHOON_LIST_URL}?t=${Date.now()}`);
        const typhoonList = await listResponse.json();

        if (!typhoonList || typhoonList.length === 0) {
          infoMsg.innerText = "現在、発表中の台風情報はありません。";
          infoMsg.style.display = "block";
          return;
        }

        // 複数の台風がある場合は、まず最新の1つ目(index 0)をターゲットにする
        const currentTyphoon = typhoonList[0];
        const eventId = currentTyphoon.eventId;
        
        if (!eventId) {
          infoMsg.innerText = "台風データのイベントIDが見つかりません。";
          infoMsg.style.display = "block";
          return;
        }

        console.log(`そらしる台風：対象のeventIdを発見 -> ${eventId}`);

        // 2. 記憶したeventIdを埋め込んで詳細データを取得
        const detailUrl = `${TYPHOON_DETAIL_BASE}${eventId}/specifications.json?t=${Date.now()}`;
        const detailResponse = await fetch(detailUrl);
        const specifications = await detailResponse.json();

        console.log("そらしる台風：詳細データの解析成功", specifications);

        // 3. 画面テロップへのデータ反映処理
        parseAndRenderTelop(specifications);
        
        // 4. 地図上へのプロット処理（次のステップ用）
        drawTyphoonTrack(specifications);

      } catch (error) {
        console.error("台風情報の取得・解析に失敗しました:", error);
        infoMsg.innerText = "台風データの取得エラーが発生しました。";
        infoMsg.style.display = "block";
      }
    }

    // 気象庁配列データを解析してフロントテロップに適用する
    function parseAndRenderTelop(dataArray) {
      const telopBox = document.getElementById("telop-container");
      
      // 安全チェック
      if (!dataArray || dataArray.length < 2) return;

      // 1. タイトルブロック(index 0)の解析
      const titleBlock = dataArray[0];
      let rawNumber = titleBlock.typhoonNumber ? String(titleBlock.typhoonNumber) : "--";
      // 例: "2606" の後ろ2桁を抽出して「6号」にする処理
      if (rawNumber.length === 4) {
        rawNumber = parseInt(rawNumber.substring(2, 4), 10);
      }
      const typhoonName = (titleBlock.name && titleBlock.name.jp) ? titleBlock.name.jp : "無名";

      // 2. 実況ブロック(index 1)の解析
      const analysisBlock = dataArray[1];
      
      // 強さの階層（強い、非常に強い、猛烈な、または「-」の場合はなし）
      let intensity = analysisBlock.intensity || "---";
      if (intensity === "-") intensity = "なし";

      // 存在地域
      const location = analysisBlock.location || "---";

      // 進行方向と速度の組み立て
      let course = analysisBlock.course || "";
      let speedNote = (analysisBlock.speed && analysisBlock.speed.note && analysisBlock.speed.note.jp) ? analysisBlock.speed.note.jp : "";
      let speedKm = (analysisBlock.speed && analysisBlock.speed.km/h) ? `${analysisBlock.speed.km/h}km/h` : "";
      
      let directionSpeed = "---";
      if (course || speedNote || speedKm) {
        // 「ゆっくり」などの表現があればそれを優先、なければkm/hを結合
        const speedStr = speedNote || speedKm;
        directionSpeed = `${course} ${speedStr}`.trim();
      }

      // 気圧・風速
      const pressure = analysisBlock.pressure || "---";
      const maxWind = (analysisBlock.maximumWind && analysisBlock.maximumWind.sustained && analysisBlock.maximumWind.sustained["m/s"]) 
                      ? analysisBlock.maximumWind.sustained["m/s"] : "---";
      const maxGust = (analysisBlock.maximumWind && analysisBlock.maximumWind.gust && analysisBlock.maximumWind.gust["m/s"]) 
                      ? analysisBlock.maximumWind.gust["m/s"] : "---";

      // DOM（HTML要素）への反映
      document.getElementById("t-num").textContent = `台風${rawNumber}号`;
      document.getElementById("t-name").textContent = `（${typhoonName}）`;
      document.getElementById("t-intensity").textContent = intensity;
      document.getElementById("t-location").textContent = location;
      document.getElementById("t-direction").textContent = directionSpeed;
      document.getElementById("t-pressure").textContent = pressure;
      document.getElementById("t-wind").textContent = maxWind;
      document.getElementById("t-gust").textContent = maxGust;

      // 反映完了したらテロップを表示
      telopBox.style.display = "block";
    }

    // Canvasへの経路描画処理（モック状態）
    function drawTyphoonTrack(dataArray) {
      const canvas = document.getElementById("typhoon-canvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // ここにこのあと、各オブジェクトの "position.deg": [緯度, 経度] を
      // 画面のピクセル座標にコンバートして描画するロジックを載せます！
    }

    window.addEventListener('DOMContentLoaded', loadTyphoonData);
  </script>
</body>
</html>
