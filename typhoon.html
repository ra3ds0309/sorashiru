<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる台風</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 指定のフォントファイルをローカルから読み込み */
    @font-face {
      font-family: 'DIN 2014 DB';
      src: url('assets/typhoon/DIN 2014 DB.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #111317; color: #ffffff; font-family: 'Noto Sans JP', sans-serif; }

    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* 🗺️ マップコンテナ：背景として背面に配置 */
    #map {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background: #111317;
    }

    /* 前面の番組送出・UIレイヤー */
    .ui-overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none; /* 地図の操作（ドラッグなど）を阻害しない */
    }

    /* 🖼️ 左上：タイトル画像 */
    .title-logo-img {
      position: absolute;
      top: 50px;
      left: 60px;
      height: 70px; /* 必要に応じてサイズ調整してください */
      object-fit: contain;
    }

    /* 🖼️ 右上：台風情報ステータスベース（template.pngを背景に配置） */
    .typhoon-template-box {
      position: absolute;
      top: 50px;
      right: 60px;
      width: 480px;
      height: 320px;
      background: url('assets/typhoon/template.png') no-repeat center/contain;
      padding: 25px 35px;
      display: none; /* データが読み込まれるまで非表示 */
    }

    /* テンプレート内のテキスト・数値配置のオーバーレイ調整 */
    .template-header {
      position: relative;
      height: 70px;
      display: flex;
      align-items: baseline;
    }

    /* 指定のDIN 2014 DBフォントを適用する台風号数 */
    .typhoon-num-din {
      font-family: 'DIN 2014 DB', sans-serif;
      font-size: 80px;
      font-weight: normal;
      color: #ffffff;
      line-height: 1;
      margin: 0 10px;
    }

    .typhoon-name-jp {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: 700;
      color: #aaaaaa;
      letter-spacing: 0.05em;
    }

    /* 詳細パラメータセクション（位置・気圧・風速・進路） */
    .data-table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }

    .data-table td {
      padding: 8px 0;
      font-size: 26px;
      font-weight: 700;
    }

    .label-col {
      width: 110px;
      color: #ffffff;
      text-align: left;
      letter-spacing: 0.1em;
    }

    .value-col {
      text-align: right;
      color: #ffffff;
    }

    /* パラメータ内の数値にもDINフォントを美しく適用 */
    .num-din {
      font-family: 'DIN 2014 DB', sans-serif;
      font-size: 32px;
      margin-right: 4px;
    }

    /* エラー・未発生時の通知 */
    .info-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 700;
      background: rgba(0,0,0,0.8);
      padding: 20px 50px;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }

    /* クレジット等の不要なUIを完全非表示 */
    .leaflet-control-attribution, .leaflet-control-zoom {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div id="map"></div>

    <div class="ui-overlay-layer">
      
      <img src="assets/typhoon/title.png" class="title-logo-img" alt="台風情報">

      <div class="info-overlay" id="info-message">台風情報は発表されていません</div>

      <div class="typhoon-template-box" id="telop-container">
        
        <div class="template-header">
          <span style="font-size: 32px; font-weight: 900;">台風</span>
          <span class="typhoon-num-din" id="t-num">--</span>
          <span style="font-size: 32px; font-weight: 900;">号</span>
          <div class="typhoon-name-jp" id="t-name">---</div>
        </div>
        
        <table class="data-table">
          <tr>
            <td class="label-col">位置</td>
            <td class="value-col" id="t-location">---</td>
          </tr>
          <tr>
            <td class="label-col">気圧</td>
            <td class="value-col"><span class="num-din" id="t-pressure">---</span>hPa</td>
          </tr>
          <tr>
            <td class="label-col">風速</td>
            <td class="value-col"><span class="num-din" id="t-wind">---</span>m/s</td>
          </tr>
          <tr>
            <td class="label-col">進路</td>
            <td class="value-col" id="t-direction">---</td>
          </tr>
        </table>

      </div>
    </div>
  </div>

  <script>
    const TYPHOON_LIST_URL = "https://www.jma.go.jp/bosai/information/data/typhoon.json";
    const TYPHOON_DETAIL_BASE = "https://www.jma.go.jp/bosai/typhoon/data/";

    let map;

    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([25.0, 135.0], 5);

      // 💡 文字（ラベル）や境界線が一切入っていない、完全無地の「CartoDB Dark Matter No Labels」を使用します！
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
        maxZoom: 10,
        minZoom: 3
      }).addTo(map);
    }

    async function loadTyphoonData() {
      const infoMsg = document.getElementById("info-message");

      try {
        console.log("そらしる台風：データ同期中...");
        const listResponse = await fetch(`${TYPHOON_LIST_URL}?t=${Date.now()}`);
        const typhoonList = await listResponse.json();

        if (!typhoonList || typhoonList.length === 0) {
          infoMsg.innerText = "現在、発表中の台風情報はありません。";
          infoMsg.style.display = "block";
          return;
        }

        const currentTyphoon = typhoonList[0];
        const eventId = currentTyphoon.eventId;
        
        if (!eventId) {
          infoMsg.innerText = "台風データのイベントIDが見つかりません。";
          infoMsg.style.display = "block";
          return;
        }

        const detailUrl = `${TYPHOON_DETAIL_BASE}${eventId}/specifications.json?t=${Date.now()}`;
        const detailResponse = await fetch(detailUrl);
        const specifications = await detailResponse.json();

        // テロップ情報および地図へのプロット反映
        parseAndRenderTelop(specifications);
        drawTyphoonOnMap(specifications);

      } catch (error) {
        console.error("台風情報の同期に失敗しました:", error);
        infoMsg.innerText = "台風データの取得エラーが発生しました。";
        infoMsg.style.display = "block";
      }
    }

    // 各データを抽出してHTML側の各要素（DINフォントエリアなど）に流し込む
    function parseAndRenderTelop(dataArray) {
      const telopBox = document.getElementById("telop-container");
      if (!dataArray || dataArray.length < 2) return;

      const titleBlock = dataArray[0];
      let rawNumber = titleBlock.typhoonNumber ? String(titleBlock.typhoonNumber) : "--";
      if (rawNumber.length === 4) {
        rawNumber = parseInt(rawNumber.substring(2, 4), 10); // "2606" -> 6
      }
      const typhoonName = (titleBlock.name && titleBlock.name.jp) ? titleBlock.name.jp : "無名";

      const analysisBlock = dataArray.find(b => b.part === "実況" || (b.part && b.part.jp === "実況")) || dataArray[1];
      
      const location = analysisBlock.location || "---";
      const pressure = analysisBlock.pressure || "---";
      const maxWind = (analysisBlock.maximumWind && analysisBlock.maximumWind.sustained && analysisBlock.maximumWind.sustained["m/s"]) ? analysisBlock.maximumWind.sustained["m/s"] : "---";

      // 進行方向・速度のパース
      let course = analysisBlock.course || "";
      let speedNote = (analysisBlock.speed && analysisBlock.speed.note && analysisBlock.speed.note.jp) ? analysisBlock.speed.note.jp : "";
      let speedKm = (analysisBlock.speed && analysisBlock.speed["km/h"]) ? `${analysisBlock.speed["km/h"]}km/h` : "";
      
      let directionSpeed = "---";
      if (course || speedNote || speedKm) {
        directionSpeed = `${course} ${speedNote || speedKm}`.trim();
      }

      // 画面要素への差し替え
      document.getElementById("t-num").textContent = rawNumber;
      document.getElementById("t-name").textContent = typhoonName;
      document.getElementById("t-location").textContent = location;
      document.getElementById("t-pressure").textContent = pressure;
      document.getElementById("t-wind").textContent = maxWind;
      document.getElementById("t-direction").textContent = directionSpeed;

      telopBox.style.display = "block";
    }

    // マップ上に台風の軌跡・予報円をスタイリッシュにマッピング
    function drawTyphoonOnMap(dataArray) {
      if (!dataArray || dataArray.length < 2) return;

      const latLngs = [];

      dataArray.forEach((block) => {
        if (block.part === "title" || !block.position || !block.position.deg) return;

        const lat = block.position.deg[0];
        const lng = block.position.deg[1];
        latLngs.push([lat, lng]);

        const isAnalysis = (block.part === "実況" || (block.part && block.part.jp === "実況"));

        if (isAnalysis) {
          // 実況：現在地（赤いシャープなサークルマーカー）
          L.circleMarker([lat, lng], {
            radius: 7,
            color: '#ff3b30',
            fillColor: '#ff3b30',
            fillOpacity: 1,
            weight: 2
          }).addTo(map);

          // 暴風域・強風域（透過感のあるスマートな警告サークル）
          if (block.galeWarning && block.galeWarning[0] && block.galeWarning[0].range) {
            const radiusKm = block.galeWarning[0].range.km;
            L.circle([lat, lng], {
              radius: radiusKm * 1000,
              color: '#ff9500',
              weight: 1.5,
              fillColor: '#ff9500',
              fillOpacity: 0.12
            }).addTo(map);
          }
        } else {
          // 予報円：未来の進路（白の点線サークル）
          if (block.probabilityCircleRadius && block.probabilityCircleRadius.km) {
            const radiusKm = block.probabilityCircleRadius.km;
            
            L.circle([lat, lng], {
              radius: radiusKm * 1000,
              color: '#ffffff',
              weight: 1.5,
              dashArray: '5, 5',
              fillColor: '#ffffff',
              fillOpacity: 0.03
            }).addTo(map);

            L.circleMarker([lat, lng], {
              radius: 2.5,
              color: '#ffffff',
              fillColor: '#ffffff',
              fillOpacity: 1
            }).addTo(map);
          }
        }
      });

      // 進路を結ぶ細めのスタイリッシュな白ライン
      if (latLngs.length > 1) {
        L.polyline(latLngs, {
          color: '#ffffff',
          weight: 3,
          opacity: 0.7
        }).addTo(map);
      }

      // 右上の情報ボックスの裏に台風が隠れないよう、自動カメラフィッティング
      if (latLngs.length > 0) {
        const bounds = L.latLngBounds(latLngs);
        map.fitBounds(bounds, { padding: [240, 240] });
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      loadTyphoonData();
    });
  </script>
</body>
</html>
