<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる台風</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #111317; color: #ffffff; font-family: 'Noto Sans JP', sans-serif; }

    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* Leafletマップ用のコンテナ（画面全体に広げる） */
    #map {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background: #0b1d33; /* 地図読み込み前の背景色（深い海の色） */
    }

    /* テレビ風：画面を締める前面の黒いボックス枠（お好みでbox.pngに変えてもOKです） */
    .ui-overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none; /* マップの操作を邪魔しないようにする */
    }

    /* 左側のテレビ風台風ステータステルプ */
    .typhoon-telop-box {
      position: absolute;
      top: 80px;
      left: 60px;
      width: 540px;
      background: rgba(15, 20, 30, 0.88);
      border-left: 12px solid #ff3b30;
      border-radius: 4px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .telop-header {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.05em;
      border-bottom: 3px solid rgba(255,255,255,0.2);
      padding-bottom: 15px;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
      align-items: baseline;
    }
    
    .typhoon-number {
      color: #ffcc00;
      font-size: 48px;
      font-weight: 900;
      margin-right: 15px;
    }

    .typhoon-name {
      font-size: 32px;
      color: #ffffff;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .status-label {
      color: #aaaaaa;
      font-weight: 500;
    }

    .status-value {
      font-weight: 700;
      font-size: 26px;
    }
    
    .font-roboto {
      font-family: 'Roboto', sans-serif;
      font-size: 32px;
      color: #ffffff;
      font-weight: 700;
    }

    /* 右上のヘッダータグ */
    .title-tag {
      position: absolute;
      top: 40px;
      right: 60px;
      background: #ff3b30;
      color: white;
      font-weight: 900;
      font-size: 28px;
      padding: 8px 25px;
      border-radius: 4px;
      letter-spacing: 0.1em;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* エラー通知や台風未発生時の表示 */
    .info-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 700;
      background: rgba(0,0,0,0.8);
      padding: 20px 50px;
      border-radius: 10px;
      z-index: 100;
      display: none;
    }

    /* Leafletのクレジット表記などをテレビ画面っぽく非表示にする */
    .leaflet-control-attribution, .leaflet-control-zoom {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div id="map"></div>

    <div class="ui-overlay-layer">
      <div class="title-tag">台風情報</div>
      <div class="info-overlay" id="info-message">台風情報は発表されていません</div>

      <div class="typhoon-telop-box" id="telop-container" style="display: none;">
        <div class="telop-header">
          <span class="typhoon-number" id="t-num">台風--号</span>
          <span class="typhoon-name" id="t-name">---</span>
        </div>
        
        <div class="status-row">
          <span class="status-label">強さ</span>
          <span class="status-value" id="t-intensity">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">存在地域</span>
          <span class="status-value" id="t-location">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">進行方向・速さ</span>
          <span class="status-value" id="t-direction">---</span>
        </div>
        <div class="status-row">
          <span class="status-label">中心気圧</span>
          <span class="status-value"><span class="font-roboto" id="t-pressure">---</span> hPa</span>
        </div>
        <div class="status-row">
          <span class="status-label">最大風速</span>
          <span class="status-value"><span class="font-roboto" id="t-wind">---</span> m/s</span>
        </div>
        <div class="status-row">
          <span class="status-label">最大瞬間風速</span>
          <span class="status-value"><span class="font-roboto" id="t-gust">---</span> m/s</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TYPHOON_LIST_URL = "https://www.jma.go.jp/bosai/information/data/typhoon.json";
    const TYPHOON_DETAIL_BASE = "https://www.jma.go.jp/bosai/typhoon/data/";

    let map;

    // Leaflet マップの初期化
    function initMap() {
      // 初期位置を日本近海（沖縄〜本州の間くらい）に設定
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([25.0, 135.0], 5);

      // スタイリッシュでダークな地図タイル（CartoDB Dark Matter）を採用
      // ※もし通常の地図が良ければ、地理院地図やOpenStreetMapに変更可能です
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 10,
        minZoom: 3
      }).addTo(map);
    }

    async function loadTyphoonData() {
      const infoMsg = document.getElementById("info-message");

      try {
        console.log("そらしる台風：同期開始...");
        const listResponse = await fetch(`${TYPHOON_LIST_URL}?t=${Date.now()}`);
        const typhoonList = await listResponse.json();

        if (!typhoonList || typhoonList.length === 0) {
          infoMsg.innerText = "現在、発表中の台風情報はありません。";
          infoMsg.style.display = "block";
          return;
        }

        const currentTyphoon = typhoonList[0];
        const eventId = currentTyphoon.eventId;
        
        if (!eventId) {
          infoMsg.innerText = "台風データのイベントIDが見つかりません。";
          infoMsg.style.display = "block";
          return;
        }

        const detailUrl = `${TYPHOON_DETAIL_BASE}${eventId}/specifications.json?t=${Date.now()}`;
        const detailResponse = await fetch(detailUrl);
        const specifications = await detailResponse.json();

        // 1. テロップ情報の描画
        parseAndRenderTelop(specifications);
        
        // 2. Leaflet地図上への進路プロット描画
        drawTyphoonOnMap(specifications);

      } catch (error) {
        console.error("台風情報の取得に失敗しました:", error);
        infoMsg.innerText = "台風データの取得エラーが発生しました。";
        infoMsg.style.display = "block";
      }
    }

    // テロップパース処理
    function parseAndRenderTelop(dataArray) {
      const telopBox = document.getElementById("telop-container");
      if (!dataArray || dataArray.length < 2) return;

      const titleBlock = dataArray[0];
      let rawNumber = titleBlock.typhoonNumber ? String(titleBlock.typhoonNumber) : "--";
      if (rawNumber.length === 4) {
        rawNumber = parseInt(rawNumber.substring(2, 4), 10);
      }
      const typhoonName = (titleBlock.name && titleBlock.name.jp) ? titleBlock.name.jp : "無名";

      const analysisBlock = dataArray[1];
      let intensity = analysisBlock.intensity || "---";
      if (intensity === "-") intensity = "なし";

      const location = analysisBlock.location || "---";

      let course = analysisBlock.course || "";
      let speedNote = (analysisBlock.speed && analysisBlock.speed.note && analysisBlock.speed.note.jp) ? analysisBlock.speed.note.jp : "";
      let speedKm = (analysisBlock.speed && analysisBlock.speed.km/h) ? `${analysisBlock.speed.km/h}km/h` : "";
      let directionSpeed = "---";
      if (course || speedNote || speedKm) {
        directionSpeed = `${course} ${speedNote || speedKm}`.trim();
      }

      const pressure = analysisBlock.pressure || "---";
      const maxWind = (analysisBlock.maximumWind && analysisBlock.maximumWind.sustained && analysisBlock.maximumWind.sustained["m/s"]) ? analysisBlock.maximumWind.sustained["m/s"] : "---";
      const maxGust = (analysisBlock.maximumWind && analysisBlock.maximumWind.gust && analysisBlock.maximumWind.gust["m/s"]) ? analysisBlock.maximumWind.gust["m/s"] : "---";

      document.getElementById("t-num").textContent = `台風${rawNumber}号`;
      document.getElementById("t-name").textContent = `（${typhoonName}）`;
      document.getElementById("t-intensity").textContent = intensity;
      document.getElementById("t-location").textContent = location;
      document.getElementById("t-direction").textContent = directionSpeed;
      document.getElementById("t-pressure").textContent = pressure;
      document.getElementById("t-wind").textContent = maxWind;
      document.getElementById("t-gust").textContent = maxGust;

      telopBox.style.display = "block";
    }

    // 💡 Leafletを使った進路図・予報円の自動描画ロジック
    function drawTyphoonOnMap(dataArray) {
      if (!dataArray || dataArray.length < 2) return;

      const latLngs = []; // 線を結ぶための緯度経度配列

      dataArray.forEach((block, index) => {
        // タイトルブロック(index 0)は座標がないのでスキップ
        if (block.part === "title" || !block.position || !block.position.deg) return;

        const lat = block.position.deg[0]; // 緯度
        const lng = block.position.deg[1]; // 経度
        latLngs.push([lat, lng]);

        if (index === 1) {
          // 【実況（現在地）の描画】
          // 現在地マーク（赤い二重丸）
          L.circleMarker([lat, lng], {
            radius: 8,
            color: '#ff3b30',
            fillColor: '#ff3b30',
            fillOpacity: 1,
            weight: 2
          }).addTo(map);

          // 暴風域・強風域の描画（データがある場合）
          if (block.galeWarning && block.galeWarning[0] && block.galeWarning[0].range) {
            const radiusKm = block.galeWarning[0].range.km;
            L.circle([lat, lng], {
              radius: radiusKm * 1000, // メートル換算
              color: '#ff9500',
              weight: 1.5,
              fillColor: '#ff9500',
              fillOpacity: 0.15
            }).addTo(map);
          }
        } else {
          // 【予報円（未来）の描画】
          if (block.probabilityCircleRadius && block.probabilityCircleRadius.km) {
            const radiusKm = block.probabilityCircleRadius.km;
            
            // 白い点線の予報円を描画
            L.circle([lat, lng], {
              radius: radiusKm * 1000,
              color: '#ffffff',
              weight: 2,
              dashArray: '6, 6', // 点線スタイル
              fillColor: '#ffffff',
              fillOpacity: 0.05
            }).addTo(map);

            // 予報円の中心点を小さくプロット
            L.circleMarker([lat, lng], {
              radius: 3,
              color: '#ffffff',
              fillColor: '#ffffff',
              fillOpacity: 1
            }).addTo(map);
          }
        }
      });

      // 各点を結ぶ進路予想の「太い白線」を描画
      if (latLngs.length > 1) {
        L.polyline(latLngs, {
          color: '#ffffff',
          weight: 4,
          opacity: 0.8
        }).addTo(map);
      }

      // 台風の位置に合わせて、マップのカメラ位置を自動フィットさせる
      if (latLngs.length > 0) {
        const bounds = L.latLngBounds(latLngs);
        map.fitBounds(bounds, { padding: [200, 200] }); // 画面端のテロップに被らないよう余白(padding)を設定
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      loadTyphoonData();
    });
  </script>
</body>
</html>
