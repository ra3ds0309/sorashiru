<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる熱中症</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000; /* 読み込み前の隙間用 */
    }

    /* 16:9 ベースコンテナ */
    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      /* 背景画像を100% 100%で配置 */
      background-image: url('assets/heatstroke/cover.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 地図レイヤー（SVGを流し込む場所） */
    .map-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* SVG自体のサイズをコンテナに合わせる */
    .map-layer svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 📝 コピーライト（以前の共有スタイル） */
    .copyright-tag {
      position: absolute;
      top: 30px;
      right: 40px;
      color: rgba(255, 255, 255, 0.1);
      font-family: 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.03em;
      z-index: 4;
    }
  </style>
</head>
<body>

  <div class="viewport">
    <!-- コピーライト -->
    <div class="copyright-tag">© Sorashiru</div>

    <!-- 地図を配置するレイヤー -->
    <div id="js-map-container" class="map-layer"></div>
  </div>

  <script>
    /**
     * 地図SVGの読み込み
     * 今後、色を塗るなどの操作ができるように fetch で読み込みます
     */
    async function initMap() {
      try {
        const response = await fetch(`assets/heatstroke/map.svg?_=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error("SVGが見つかりません");
        
        const svgText = await response.text();
        document.getElementById('js-map-container').innerHTML = svgText;
        console.log("🗺️ 地図を100%サイズで配置しました。");
      } catch (e) {
        console.error("❌ エラー:", e);
      }
    }

    window.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
