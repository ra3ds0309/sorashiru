<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる熱中症</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500&family=Roboto:wght@400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background-image: url('assets/heatstroke/cover.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .map-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .map-layer svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 🕒 ご指定の発表日時スタイル */
    .report-time-tag {
      position: absolute;
      top: 125px;
      left: 50px;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      z-index: 4;
    }

    .copyright-tag {
      position: absolute;
      top: 30px;
      right: 40px;
      color: rgba(255, 255, 255, 0.1);
      font-family: 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.03em;
      z-index: 4;
    }
  </style>
</head>
<body>

  <div class="viewport">
    <div id="js-report-time" class="report-time-tag"></div>

    <div class="copyright-tag">© Sorashiru</div>
    <div id="js-map-container" class="map-layer"></div>
  </div>

  <script>
    // 🎨 アラート区分ごとの色定義
    const WBGT_COLORS = {
      danger: '#1D0022',       // 特別警戒アラート (special_alert)
      severe: '#A000A0',       // 警戒アラート (alert)
      warning: '#FF1F25',      // 危険 (over31)
      attention: '#595959',    // 注意 (上記以外)
      default: '#595959'
    };

    function getCacheBusterUrl(url) {
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}_=${Date.now()}`;
    }

    // 1. 地図SVGファイルの読み込み
    async function loadMapSVG() {
      const response = await fetch(getCacheBusterUrl('assets/heatstroke/map.svg'), { cache: 'no-store' });
      if (!response.ok) throw new Error("map.svg が見つかりません");
      const svgText = await response.text();
      document.getElementById('js-map-container').innerHTML = svgText;
    }

    // 2. name.txt を読み込んでマッピング作成
    async function loadNameMapping() {
      const response = await fetch(getCacheBusterUrl('assets/heatstroke/name.txt'), { cache: 'no-store' });
      if (!response.ok) throw new Error("name.txt が見つかりません");
      const text = await response.text();
      
      const mapping = {};
      const lines = text.split('\n');

      lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        const match = line.match(/^([^\[]+)\[([^\]]+)\]/);
        if (match) {
          const svgId = match[1].trim();
          const jsonName = match[2].trim();
          mapping[jsonName] = svgId;
        }
      });
      return mapping;
    }

    // 3. メイン処理：保存されたローカルのJSONデータを取得して色を塗る
    async function main() {
      try {
        const [_, nameMap] = await Promise.all([
          loadMapSVG(),
          loadNameMapping()
        ]);

        const dataUrl = 'assets/heatstroke/data.json';
        const response = await fetch(getCacheBusterUrl(dataUrl), { cache: 'no-store' });
        const resData = await response.json();

        if (resData.status !== "success" || !resData.data) return;

        // 🕒 発表日時の反映処理
        if (resData.data.report_wbgt) {
          const reportDate = new Date(resData.data.report_wbgt);
          const day = reportDate.getDate();
          const hours = reportDate.getHours();
          document.getElementById('js-report-time').innerText = `${day}日 ${hours}時発表`;
        }

        const todayData = resData.data.today;
        if (!todayData || !todayData.wbgt) return;

        // 各種アラートリストの抽出 (存在しない場合は空配列)
        const specialAlerts = todayData.alerts?.special_alert || [];
        const normalAlerts = todayData.alerts?.alert || [];
        const over31List = todayData.wbgt?.over31 || [];

        // 色塗りロジック
        Object.keys(todayData.wbgt).forEach(areaName => {
          // 'over31' 自体は地域名ではないため処理をスキップ
          if (areaName === 'over31') return;

          // 🌟 新しい判定システム（優先度の高い順）
          let color = WBGT_COLORS.attention; // デフォルトは attention (注意)

          if (specialAlerts.includes(areaName)) {
            color = WBGT_COLORS.danger;       // special_alert にあれば danger
          } else if (normalAlerts.includes(areaName)) {
            color = WBGT_COLORS.severe;       // alert にあれば severe
          } else if (over31List.includes(areaName)) {
            color = WBGT_COLORS.warning;      // over31 にあれば warning
          }

          const svgId = nameMap[areaName];

          if (svgId) {
            const element = document.getElementById(svgId);
            if (element) {
              element.style.fill = color;
            }
          }
        });
        console.log("🎨 アラート条件に基づいた色塗りが完了しました！");

      } catch (e) {
        console.error("❌ 処理中にエラーが発生しました:", e);
      }
    }

    window.addEventListener('DOMContentLoaded', main);
  </script>
</body>
</html>
