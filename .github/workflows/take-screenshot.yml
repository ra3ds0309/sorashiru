name: Take Weather Screenshot and Notify Discord

on:
  schedule:
    # 📝 毎日2回定期実行（UTC表記）
    # 1. 日本時間 朝06:00 ➡ UTC 前日21:00
    # 2. 日本時間 夕18:00 ➡ UTC 当日09:00
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行用ボタン

# ✨ Node.js 20の減衰警告を黙らせ、Node.js 24環境で動かすためのグローバル環境変数
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # ✨ Node.js 24にバージョンアップ

    - name: Install Dependencies
      run: |
        npm init -y
        npm install puppeteer

    - name: Take Screenshot
      id: capture_step
      run: |
        node capture.js

    - name: Send Screenshot to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # 最新の outputs 参照方法で取得
        FILEPATH="${{ steps.capture_step.outputs.filepath }}"
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        
        # ファイル名（例: weather_20260522_0530.png）から「日」と「時」を自動抽出
        DAY=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{6}([0-9]{2})_[0-9]{4}\.png/\1/')
        EXEC_HOUR=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{8}_([0-9]{2})[0-9]{2}\.png/\1/')
        
        # 頭の0を排除して1時間引く（6時実行なら5時、18時実行なら17時発表）
        EXEC_HOUR_CLEAN=$(echo "$EXEC_HOUR" | sed 's/^0//')
        REPORT_HOUR=$((EXEC_HOUR_CLEAN - 1))
        
        if [ "$REPORT_HOUR" -lt 10 ]; then
          REPORT_HOUR="0$REPORT_HOUR"
        fi

        # ご指定のテキストフォーマットに組み立て
        MESSAGE="【きょうの天気予報】"$'\n'"${DAY}日${REPORT_HOUR}時 気象庁発表"
        
        echo "Discordへ送信するメッセージ:"
        echo "$MESSAGE"
        echo "Discordへ画像を送信中: $FILENAME"
        
        # Webhookへテキストと画像を送信
        curl -X POST -F "content=$MESSAGE" -F "file=@$FILEPATH" $DISCORD_WEBHOOK

    - name: Commit and Push Screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png
        if ! git diff --cached --quiet; then
          git commit -m "chore: 🌟 天気画面のスクリーンショットを自動保存 [skip ci]"
          git push
        else
          echo "変更がありませんでした。"
        fi
