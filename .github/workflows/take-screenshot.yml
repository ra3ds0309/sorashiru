name: Take Weather Screenshot and Notify Discord

on:
  schedule:
    # 📝 混雑する「00分」を少しズラして、早めに起動させやすく設定（朝05:45、夕17:45目安）
    - cron: '45 20 * * *'  # UTC 20:45 ➡ JST 翌朝 05:45
    - cron: '45 8 * * *'   # UTC 08:45  ➡ JST 当日夕 17:45
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm init -y
        npm install puppeteer @google/genai

    - name: Take Screenshot
      id: capture_step
      run: |
        node capture.js

    - name: Generate Weather Summary via Gemini
      id: gemini_step
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RAW_DATA: ${{ steps.capture_step.outputs.raw_data }}
      run: |
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        
        # 💡 ファイル名（JST基準）から実行時間をしっかりパース
        EXEC_HOUR=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{8}_([0-9]{2})[0-9]{2}\.png/\1/')
        EXEC_HOUR_CLEAN=$(echo "$EXEC_HOUR" | sed 's/^0//')
        
        # 朝（05~07時台の実行）なら「きょう」、夕方（17~19時台の実行）なら「あす」
        TARGET_DAY="きょう"
        if [ "$EXEC_HOUR_CLEAN" -ge 12 ]; then
          TARGET_DAY="あす"
        fi

        node -e "
        const { GoogleGenAI } = require('@google/genai');
        const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
        
        async function run() {
          const targetDay = process.argv[1];
          const prompt = \`以下の日本の各都市のリアルタイムな天気予報データをもとに、テレビの天気ニュースの気象予報士が読み上げるような、自然でわかりやすい【\${targetDay}の全国天気概況】の文章を150文字くらいで作成してください。
          
          【与えられた各都市の天気データ】
          \${process.env.RAW_DATA}

          【作成時のルール】
          1. データに存在する天気の傾向（晴れ、曇り、雨、雪など）を正確に反映させてください。
          2. 大まかに地方ブロック（沖縄、九州・中国・四国、近畿・中部・関東甲信、北陸・東北、北海道など）をいくつかグループ化して、まとめて天気の傾向を伝えてください。
          3. '承知しました'や'以下に文章を出力します'などの前置き・解説の言葉は一切省き、指定された天気予報の解説本文のみを出力してください。\`;

          try {
            const response = await ai.models.generateContent({
              model: 'gemini-2.5-flash',
              contents: prompt,
            });
            const text = response.text.trim();
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=' + text.replace(/\n/g, ' ') + '\\n');
          } catch (e) {
            console.error('Gemini API Error:', e);
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=全国的におおむね安定した天気となるでしょう。\\n');
          }
        }
        run();
        " "$TARGET_DAY"

    - name: Send Screenshot to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        FILEPATH="${{ steps.capture_step.outputs.filepath }}"
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        SUMMARY="${{ secrets.GEMINI_API_KEY && steps.gemini_step.outputs.summary || '全国の天気をお伝えします。' }}"
        
        DAY=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{6}([0-9]{2})_[0-9]{4}\.png/\1/')
        EXEC_HOUR=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{8}_([0-9]{2})[0-9]{2}\.png/\1/')
        EXEC_HOUR_CLEAN=$(echo "$EXEC_HOUR" | sed 's/^0//')
        
        # 気象庁の発表時間は、朝実行なら「05時」、夕方実行なら「17時」にテキスト固定化
        if [ "$EXEC_HOUR_CLEAN" -ge 12 ]; then
          TITLE="【あすの天気予報】"
          REPORT_HOUR="17"
        else
          TITLE="【きょうの天気予報】"
          REPORT_HOUR="05"
        fi

        MESSAGE="**${TITLE}** ${DAY}日${REPORT_HOUR}時 気象庁発表"$'\n'"$SUMMARY"
        
        echo "Discordへ送信するメッセージ:"
        echo "$MESSAGE"
        
        curl -X POST -F "content=$MESSAGE" -F "file=@$FILEPATH" $DISCORD_WEBHOOK

    - name: Commit and Push Screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png
        if ! git diff --cached --quiet; then
          git commit -m "chore: 🌟 天気画面のスクリーンショットを自動保存 [skip ci]"
          git push
        else
          echo "変更がありませんでした。"
        fi
