name: Take Weather Screenshot and Notify Discord

on:
  schedule:
    # 📝 毎日2回定期実行（UTC表記）
    # 1. 日本時間 朝06:00 ➡ UTC 前日21:00
    # 2. 日本時間 夕18:00 ➡ UTC 当日09:00
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行用ボタン

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        npm init -y
        npm install puppeteer

    - name: Take Screenshot
      id: capture_step # あとでファイル名を参照するためにIDをつける
      run: |
        node capture.js

    - name: Send Screenshot to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # capture.js から出力されたファイルパスを取得
        FILEPATH="${{ steps.capture_step.outputs.filepath }}"
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        
        # メッセージの文章を作成（お好みで変更してください）
        MESSAGE="☀️ **そらしるお天気情報が更新されました！** ☀️"
        
        echo "Discordへ画像を送信中: $FILENAME"
        
        # cURLコマンドを使って、DiscordのWebhookに画像をスタンドアロンでアップロード
        curl -X POST -F "content=$MESSAGE" -F "file=@$FILEPATH" $DISCORD_WEBHOOK

    - name: Commit and Push Screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png
        if ! git diff --cached --quiet; then
          git commit -m "chore: 🌟 天気画面のスクリーンショットを自動保存 [skip ci]"
          git push
        else
          echo "変更がありませんでした。"
        fi
