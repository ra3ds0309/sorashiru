name: Take Weather Screenshot and Notify Discord

on:
  schedule:
    # 毎日2回定期実行（UTC表記）
    # 1. 日本時間 朝06:00 ➡ UTC 前日21:00
    # 2. 日本時間 夕18:00 ➡ UTC 当日09:00
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm init -y
        npm install puppeteer @google/genai

    - name: Take Screenshot
      id: capture_step
      run: |
        node capture.js

    - name: Generate Weather Summary via Gemini
      id: gemini_step
      # 💡 重複していた env を1つに綺麗にまとめました
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RAW_DATA: ${{ steps.capture_step.outputs.raw_data }}
      run: |
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        
        # 実行時間から「きょう」か「あす」かを判定
        EXEC_HOUR=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{8}_([0-9]{2})[0-9]{2}\.png/\1/')
        EXEC_HOUR_CLEAN=$(echo "$EXEC_HOUR" | sed 's/^0//')
        REPORT_HOUR=$((EXEC_HOUR_CLEAN - 1))
        
        TARGET_DAY="きょう"
        if [ "$REPORT_HOUR" -eq 17 ]; then
          TARGET_DAY="あす"
        fi

        # インラインでNode.jsスクリプトを実行
        node -e "
        const { GoogleGenAI } = require('@google/genai');
        const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
        
        async function run() {
          const targetDay = process.argv[1];
          const prompt = \`以下の日本の各都市の気温データをもとに、テレビの天気ニュースの気象予報士が読み上げるような、自然でわかりやすい【\${targetDay}の全国天気概況】の文章を150文字以内で作成してください。
          
          特徴として、大まかに地方ブロック（沖縄、九州・四国・中国、近畿・中部・関東、北陸・東北、北海道など）をいくつかまとめて天気の傾向（晴れ、曇り、雨など）を伝えるようにしてください。
          
          【データ一覧】
          \${process.env.RAW_DATA}
          
          【出力フォーマット】
          余計な解説や前置き（'承知しました'など）は一切含めず、天気概要の文章本体のみを出力してください。\`;

          try {
            const response = await ai.models.generateContent({
              model: 'gemini-2.5-flash',
              contents: prompt,
            });
            const text = response.text.trim();
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=' + text.replace(/\n/g, ' ') + '\\n');
          } catch (e) {
            console.error('Gemini API Error:', e);
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=全国的におおむね安定した天気となるでしょう。\\n');
          }
        }
        run();
        " "$TARGET_DAY"

    - name: Send Screenshot to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        FILEPATH="${{ steps.capture_step.outputs.filepath }}"
        FILENAME="${{ steps.capture_step.outputs.filename }}"
        SUMMARY="${{ steps.gemini_step.outputs.summary }}"
        
        DAY=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{6}([0-9]{2})_[0-9]{4}\.png/\1/')
        EXEC_HOUR=$(echo "$FILENAME" | sed -E 's/weather_[0-9]{8}_([0-9]{2})[0-9]{2}\.png/\1/')
        
        EXEC_HOUR_CLEAN=$(echo "$EXEC_HOUR" | sed 's/^0//')
        REPORT_HOUR=$((EXEC_HOUR_CLEAN - 1))
        
        if [ "$REPORT_HOUR" -eq 17 ]; then
          TITLE="【あすの天気予報】"
        else
          TITLE="【きょうの天気予報】"
        fi
        
        if [ "$REPORT_HOUR" -lt 10 ]; then
          REPORT_HOUR="0$REPORT_HOUR"
        fi

        MESSAGE="${TITLE}"$'\n'"${DAY}日${REPORT_HOUR}時 気象庁発表"$'\n\n'"$SUMMARY"
        
        echo "Discordへ送信するメッセージ:"
        echo "$MESSAGE"
        
        curl -X POST -F "content=$MESSAGE" -F "file=@$FILEPATH" $DISCORD_WEBHOOK

    - name: Commit and Push Screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png
        if ! git diff --cached --quiet; then
          git commit -m "chore: 🌟 天気画面のスクリーンショットを自動保存 [skip ci]"
          git push
        else
          echo "変更がありませんでした。"
        fi
