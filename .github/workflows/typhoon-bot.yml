name: 台風情報

on:
  schedule:
    # ⏱️ 日本時間(JST)の毎日昼12:30に実行 (12:30 - 9時間 = UTC 3:30)
    - cron: '30 3 * * *'
  workflow_dispatch:
    # 🛠️ 手動実行ボタンを残しておく（テスト用）

# 💡 警告対策：ワークフロー全体（すべてのアクション）でNode.js 24への強制移行を有効化
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # リポジトリへの書き込み権限（git push）を明示的に許可
    permissions:
      contents: write

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 環境のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. 必要なパッケージのインストール
      - name: Install dependencies
        run: |
          npm init -y
          npm install puppeteer

      # 4. スクショ撮影＆Gemini解説スクリプトの実行
      - name: Run script & Notify Discord
        env:
          TYPHOON_WEBHOOK_URL: ${{ secrets.TYPHOON_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node capture-typhoon.js

      # 5. 撮影された画像がある場合のみ、リポジトリに保存してコミットする
      - name: Commit and Push Screenshot
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add typhoon-screenshots/*.png
          git commit -m "Update typhoon screenshot [skip ci]" || exit 0
          git push
