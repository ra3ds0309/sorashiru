name: Capture and Notify Warning Map

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごとに自動実行
  workflow_dispatch:      # GitHub画面から手動で即時実行するボタンも有効化

jobs:
  capture-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Puppeteer用の依存ライブラリとChromeのインストール
        run: |
          npm install puppeteer
          # Ubuntu環境でPuppeteer（Chrome）を動かすための設定
          npx puppeteer browsers install chrome

      - name: スクショ撮影とDiscord通知の実行
        env:
          WARNING_WEBHOOK_URL: ${{ secrets.WARNING_WEBHOOK_URL }}
        run: node capture-warning.js

      - name: 撮影したスクリーンショットをActionsの成果物として保存
        if: always() # 途中でエラーが起きても、撮影できていれば保存する
        uses: actions/upload-artifact@v4
        with:
          name: warning-screenshots
          path: warning-screenshots/
          retention-days: 1 # 容量節約のため1日後に自動消去
