<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる天気</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #22252a; }

    /* 2pxの余白を強制カット */
    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    .base-container {
      width: 100%;
      height: 100%;
      background: url('assets/whether/cover.jpg') no-repeat center/cover;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(1.005); 
    }

    .map-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/whether/today.png') no-repeat center/cover;
      z-index: 1;
    }

    .box-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/whether/box.png') no-repeat center/cover;
      z-index: 2;
    }

    /* データ配置用レイヤー */
    .content-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
    }

    /* ✨ エディタから出力された最新のデザインCSS（地名スタイルは削除） ✨ */
    .city-pin { position: absolute; width: 120px; text-align: center; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); }
    .city-icon { width: 103px; height: 103px; filter: drop-shadow(0px 4px 0px rgba(0,0,0,0)); }
    .city-temp { font-family: 'Roboto', sans-serif; font-size: 26px; font-weight: bold; margin-top: -10px; }
    .t-min { color: #5dade2; margin-right: 20px; }
    .t-max { color: #e67e22; }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div class="base-container">
      <div class="map-layer"></div>
      <div class="box-layer"></div>
      <div class="content-overlay" id="content-container"></div>
    </div>
  </div>

  <script>
    // 🌐 エディタで調整された最新の都市座標データ（targetCities）
    const targetCities = [
      { "name": "旭川", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/012000.json", "x": 1456, "y": 160 },
      { "name": "札幌", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json", "x": 1281, "y": 201 },
      { "name": "青森", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/020000.json", "x": 1168, "y": 344 },
      { "name": "盛岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/030000.json", "x": 1323, "y": 446 },
      { "name": "仙台", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/040000.json", "x": 1209, "y": 496 },
      { "name": "山形", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/060000.json", "x": 1091, "y": 508 },
      { "name": "水戸", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/080000.json", "x": 1196, "y": 649 },
      { "name": "宇都宮", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/090000.json", "x": 1081, "y": 663 },
      { "name": "東京", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1101, "y": 820 },
      { "name": "伊豆諸島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1160, "y": 989 },
      { "name": "小笠原諸島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1636, "y": 921 },
      { "name": "静岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/220000.json", "x": 981, "y": 835 },
      { "name": "長野", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/200000.json", "x": 966, "y": 679 },
      { "name": "金沢", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/170000.json", "x": 853, "y": 673 },
      { "name": "名古屋", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/230000.json", "x": 863, "y": 829 },
      { "name": "大阪", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/270000.json", "x": 743, "y": 856 },
      { "name": "高松", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/370000.json", "x": 739, "y": 696 },
      { "name": "高知", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/390000.json", "x": 623, "y": 870 },
      { "name": "松江", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/320000.json", "x": 626, "y": 691 },
      { "name": "山口", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/350000.json", "x": 513, "y": 729 },
      { "name": "福岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/400000.json", "x": 393, "y": 753 },
      { "name": "熊本", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/430000.json", "x": 385, "y": 914 },
      { "name": "鹿児島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/460100.json", "x": 501, "y": 896 },
      { "name": "奄美", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/460100.json", "x": 250, "y": 993 },
      { "name": "那覇", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/471000.json", "x": 334, "y": 250 },
      { "name": "大東島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/472000.json", "x": 644, "y": 379 },
      { "name": "石垣島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/474000.json", "x": 168, "y": 319 }
    ];

    // 天気コードフォールバック
    function convertWeatherCode(code) {
      const codeStr = String(code);
      const activeCodes = ["100", "200", "300", "400"]; 
      if (activeCodes.includes(codeStr)) return codeStr;
      if (codeStr.startsWith("1")) return "100";
      if (codeStr.startsWith("2")) return "200";
      if (codeStr.startsWith("3")) return "300";
      if (codeStr.startsWith("4")) return "400";
      return "200";
    }

    // 🌐 気象庁からデータをリアルタイム取得してピンを動的生成するメイン処理
    async function loadWeatherData() {
      const container = document.getElementById('content-container');
      container.innerHTML = ''; // 初期化

      console.log("そらしる：気象庁データ同期中...");

      const promises = targetCities.map(async (city) => {
        try {
          const response = await fetch(`${city.url}?t=${Date.now()}`);
          const json = await response.json();
          
          const forecastBlock = json[0];
          const timeSeries = forecastBlock.timeSeries;
          
          // エリア特定
          let areaData = timeSeries[0].areas.find(a => a.area.name.includes(city.name) || city.name.includes(a.area.name));
          if (!areaData) areaData = timeSeries[0].areas[0];
          
          const weatherCode = areaData.weatherCodes[0]; 
          const finalCode = convertWeatherCode(weatherCode);

          // 気温の取得処理
          let tempMin = "--";
          let tempMax = "--";
          if (timeSeries[2]) {
            let tempAreaData = timeSeries[2].areas.find(a => a.area.name.includes(city.name) || city.name.includes(a.area.name));
            if (!tempAreaData) tempAreaData = timeSeries[2].areas[0];
            if (tempAreaData && tempAreaData.temps) {
              tempMin = tempAreaData.temps[0] || "--";
              tempMax = tempAreaData.temps[1] || "--";
            }
          }

          // 📍 HTML要素（ピン）を組み立て
          const pin = document.createElement('div');
          pin.className = 'city-pin';
          pin.style.left = `${city.x}px`;
          pin.style.top = `${city.y}px`;

          // ✨ 【修正】地名のDIVを完全に消去、さらに気温の「°C」表記を除去しました ✨
          pin.innerHTML = `
            <img class="city-icon" src="assets/whether/icons/${finalCode}.svg" alt="weather">
            <div class="city-temp">
              <span class="t-min">${tempMin}</span><span class="t-max">${tempMax}</span>
            </div>
          `;

          container.appendChild(pin);

        } catch (error) {
          console.error(`${city.name}の天気データの取得に失敗しました:`, error);
        }
      });

      await Promise.all(promises);
      console.log("そらしる：すべての天気データをマップに反映しました。");
    }

    window.addEventListener('DOMContentLoaded', loadWeatherData);
  </script>
</body>
</html>
