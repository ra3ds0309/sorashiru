<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる天気</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Roboto:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #22252a; }

    /* 2pxの余白を強制カット */
    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    .base-container {
      width: 100%;
      height: 100%;
      background: url('assets/whether/cover.jpg') no-repeat center/cover;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(1.005); 
    }

    /* 背景マップ（JSから動的に背景画像を書き換えるため、初期のbackgroundは指定しない） */
    .map-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      z-index: 1;
    }

    .box-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/whether/box.png') no-repeat center/cover;
      z-index: 2;
    }

    /* データ配置用レイヤー */
    .content-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
    }

    /* 左上：発表時刻のスタイル (Noto Sans JP / 500 / 28px) */
    .report-time-tag {
      position: absolute;
      top: 125px;
      left: 50px;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      z-index: 4;
    }

    /* 右上：著作権表記のスタイル (Roboto / 400) */
    .copyright-tag {
      position: absolute;
      top: 30px;
      right: 40px;
      color: rgba(255, 255, 255, 0.1);
      font-family: 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.03em;
      z-index: 4;
    }

    /* 都市ピンのスタイル */
    .city-pin {
      position: absolute;
      width: 120px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translate(-50%, -50%);
    }

    /* 天気アイコンのスタイル */
    .city-icon {
      width: 104px;
      height: 104px;
      filter: drop-shadow(0px 4px 0px rgba(0,0,0,0));
    }

    /* 気温コンテナのスタイル (Roboto / 600) */
    .city-temp {
      font-family: 'Roboto', sans-serif;
      font-size: 30px;
      font-weight: 600;
      margin-top: -15px;
      text-shadow: none !important;
      white-space: nowrap;
      
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* 数字フォントの幅固定（ズレ対策） */
    .t-min, .t-max {
      display: inline-block;
      width: 45px;
      text-align: center;
    }
    
    /* 最低気温（青） */
    .t-min {
      color: #4DC4FF;
      margin-right: 10px;
    }
    
    /* 最高気温（赤） */
    .t-max {
      color: #FF4B00;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div class="base-container">
      <div class="report-time-tag" id="report-time">-日 --時発表</div>
      <div class="copyright-tag">© Sorashiru</div>

      <div class="map-layer" id="map-bg"></div>
      <div class="box-layer"></div>
      <div class="content-overlay" id="content-container"></div>
    </div>
  </div>

  <script>
    // 全27都市の座標データ配列
    const targetCities = [
      { "name": "旭川", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/012000.json", "x": 1456, "y": 159 },
      { "name": "札幌", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json", "x": 1281, "y": 200 },
      { "name": "青森", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/020000.json", "x": 1166, "y": 345 },
      { "name": "盛岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/030000.json", "x": 1323, "y": 448 },
      { "name": "仙台", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/040000.json", "x": 1208, "y": 496 },
      { "name": "山形", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/060000.json", "x": 1093, "y": 508 },
      { "name": "水戸", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/080000.json", "x": 1196, "y": 651 },
      { "name": "宇都宮", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/090000.json", "x": 1081, "y": 666 },
      { "name": "東京", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1101, "y": 821 },
      { "name": "伊豆諸島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1160, "y": 991 },
      { "name": "小笠原諸島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/130000.json", "x": 1638, "y": 920 },
      { "name": "静岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/220000.json", "x": 983, "y": 835 },
      { "name": "長野", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/200000.json", "x": 966, "y": 678 },
      { "name": "金沢", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/170000.json", "x": 853, "y": 674 },
      { "name": "名古屋", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/230000.json", "x": 863, "y": 831 },
      { "name": "大阪", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/270000.json", "x": 743, "y": 858 },
      { "name": "高松", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/370000.json", "x": 739, "y": 698 },
      { "name": "高知", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/390000.json", "x": 623, "y": 870 },
      { "name": "松江", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/320000.json", "x": 626, "y": 693 },
      { "name": "山口", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/350000.json", "x": 513, "y": 730 },
      { "name": "福岡", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/400000.json", "x": 394, "y": 755 },
      { "name": "熊本", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/430000.json", "x": 385, "y": 915 },
      { "name": "鹿児島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/460100.json", "x": 503, "y": 896 },
      { "name": "奄美", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/460100.json", "x": 250, "y": 991 },
      { "name": "那覇", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/471000.json", "x": 333, "y": 251 },
      { "name": "大東島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/472000.json", "x": 644, "y": 380 },
      { "name": "石垣島", "url": "https://www.jma.go.jp/bosai/forecast/data/forecast/474000.json", "x": 166, "y": 319 }
    ];

    // コード変換表マッピング
    const jmaIconMap = {
      "100": "100", "101": "101", "102": "102", "103": "102", "104": "104", "105": "104", "106": "102", "107": "102", "108": "102",
      "110": "110", "111": "110", "112": "112", "113": "112", "114": "112", "115": "115", "116": "115", "117": "115", "118": "112",
      "119": "119", "120": "102", "121": "102", "123": "112", "124": "100", "125": "100", "126": "119", "127": "112", "128": "112",
      "130": "100", "131": "100", "132": "101", "140": "140", "160": "104", "170": "104", "181": "115",
      "200": "200", "201": "201", "202": "202", "203": "202", "204": "204", "205": "205", "206": "205", "207": "205", "208": "219",
      "209": "200", "210": "210", "211": "210", "212": "212", "213": "212", "214": "212", "215": "215", "216": "215", "217": "215",
      "218": "215", "219": "219", "220": "202", "221": "202", "222": "202", "223": "201", "224": "212", "225": "212", "226": "212",
      "228": "215", "229": "215", "230": "215", "231": "200", "240": "240", "250": "250", "260": "204", "270": "204", "281": "215",
      "300": "300", "301": "301", "302": "302", "303": "303", "306": "306", "308": "306", "309": "303", "311": "311", "313": "313",
      "314": "314", "315": "314", "316": "311", "317": "313", "320": "311", "321": "313", "322": "314", "323": "311", "324": "311",
      "325": "311", "326": "314", "327": "314", "328": "306", "329": "300", "340": "400", "350": "350", "361": "411", "371": "413",
      "400": "400", "401": "401", "402": "402", "403": "403", "405": "405", "406": "405", "407": "405", "409": "403", "411": "411",
      "413": "413", "414": "414", "420": "411", "421": "413", "422": "414", "423": "414", "425": "405", "426": "400", "427": "400",
      "450": "450"
    };

    function convertWeatherCode(code) {
      const codeStr = String(code).trim();
      if (jmaIconMap[codeStr]) return jmaIconMap[codeStr];
      if (codeStr.startsWith("1")) return "100";
      if (codeStr.startsWith("2")) return "200";
      if (codeStr.startsWith("3")) return "300";
      if (codeStr.startsWith("4")) return "400";
      return "200";
    }

    // ✨ 【修正】発表時刻の更新処理と同時に、背景画像（today / tomorrow）を自動で切り替える
    function updateReportTimeAndBackground(isoString) {
      if (!isoString) return;
      try {
        const date = new Date(isoString);
        const day = date.getDate();
        const hours = date.getHours();
        
        // 左上のテキストラベルを書き換え
        const labelElement = document.getElementById('report-time');
        if (labelElement) {
          labelElement.textContent = `${day}日 ${hours}時発表`;
        }

        // 背景レイヤー要素を取得
        const bgLayer = document.getElementById('map-bg');
        if (bgLayer) {
          // 💡 17時発表の場合は tomorrow.png、それ以外(5時や11時など)は today.png
          if (hours === 17) {
            bgLayer.style.backgroundImage = "url('assets/whether/tomorrow.png')";
            console.log("そらしる：17時発表データのため背景を【tomorrow.png】に設定しました。");
          } else {
            bgLayer.style.backgroundImage = "url('assets/whether/today.png')";
            console.log(`そらしる：${hours}時発表データのため背景を【today.png】に設定しました。`);
          }
        }
      } catch (e) {
        console.error("発表時刻の解析、または背景切り替えに失敗しました:", e);
      }
    }

    // 気象庁からデータをリアルタイム取得してピンを動的生成するメイン処理
    async function loadWeatherData() {
      const container = document.getElementById('content-container');
      container.innerHTML = ''; // 初期化

      console.log("そらしる：気象庁データ同期中...");
      
      let hasSetReportTime = false;

      const promises = targetCities.map(async (city) => {
        try {
          const response = await fetch(`${city.url}?t=${Date.now()}`);
          const json = await response.json();
          
          const forecastBlock = json[0];
          
          // 最初にとれた有効なデータのreportDatetimeを利用して時間表示と背景を更新
          if (!hasSetReportTime && forecastBlock.reportDatetime) {
            updateReportTimeAndBackground(forecastBlock.reportDatetime);
            hasSetReportTime = true;
          }

          const timeSeries = forecastBlock.timeSeries;
          
          // エリア特定
          let areaData = timeSeries[0].areas.find(a => a.area.name.includes(city.name) || city.name.includes(a.area.name));
          if (!areaData) areaData = timeSeries[0].areas[0];
          
          const weatherCode = areaData.weatherCodes[0]; 
          const finalCode = convertWeatherCode(weatherCode);

          // 気温の取得処理
          let tempMin = "--";
          let tempMax = "--";
          if (timeSeries[2]) {
            let tempAreaData = timeSeries[2].areas.find(a => a.area.name.includes(city.name) || city.name.includes(a.area.name));
            if (!tempAreaData) tempAreaData = timeSeries[2].areas[0];
            if (tempAreaData && tempAreaData.temps) {
              tempMin = tempAreaData.temps[0] || "--";
              tempMax = tempAreaData.temps[1] || "--";
            }
          }

          // HTML要素（ピン）を組み立て
          const pin = document.createElement('div');
          pin.className = 'city-pin';
          pin.style.left = `${city.x}px`;
          pin.style.top = `${city.y}px`;

          pin.innerHTML = `
            <img class="city-icon" src="assets/whether/icons/${finalCode}.svg" alt="weather">
            <div class="city-temp">
              <span class="t-min">${tempMin}</span><span class="t-max">${tempMax}</span>
            </div>
          `;

          container.appendChild(pin);

        } catch (error) {
          console.error(`${city.name}の天気データの取得に失敗しました:`, error);
        }
      });

      await Promise.all(promises);
      console.log("そらしる：すべての天気データをマップに反映しました。");
    }

    window.addEventListener('DOMContentLoaded', loadWeatherData);
  </script>
</body>
</html>
