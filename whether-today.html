<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる - きょうの天気 (1920x1080)</title>
  <style>
    /* 余白を完全にゼロにし、スクローバーを非表示に */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #22252a; }

    /* 元画像にある2pxの余白を強制的にカットするためのラッパー */
    .viewport-trimmer {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    .base-container {
      width: 100%;
      height: 100%;
      /* 1層目：グラデーション背景 (cover.jpg) */
      background: url('assets/whether/cover.jpg') no-repeat center/cover;
      position: absolute;
      top: 0;
      left: 0;
      /* 上下左右2pxの余白を画面外に押し出して見えなくする処理 */
      transform: scale(1.005); 
    }

    /* 2層目：日本地図レイヤー (today.png) */
    .map-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/whether/today.png') no-repeat center/cover;
      z-index: 1;
      pointer-events: none;
    }

    /* 3層目：情報表示用の黒半透明ボード (box.png) */
    .box-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/whether/box.png') no-repeat center/cover;
      z-index: 2;
      pointer-events: none;
    }

    /* 4層目：データ配置用オーバーレイ（1920x1080の絶対座標でパーツを置く場所） */
    .content-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div class="viewport-trimmer">
    <div class="base-container">
      <div class="map-layer"></div>

      <div class="box-layer"></div>

      <div class="content-overlay" id="content-container">
        </div>
    </div>
  </div>

  <script>
    // コード変換ロジック（前回のフォールバックを維持）
    function convertWeatherCode(code) {
      const codeStr = String(code);
      const activeCodes = ["100", "200", "300", "400"]; 
      if (activeCodes.includes(codeStr)) return codeStr;
      if (codeStr.startsWith("1")) return "100";
      if (codeStr.startsWith("2")) return "200";
      if (codeStr.startsWith("3")) return "300";
      if (codeStr.startsWith("4")) return "400";
      return "200";
    }

    // 今後Actionsから全国のデータ配列をまとめて受け取るための関数
    function updateAllWeathers(weatherList) {
      const container = document.getElementById('content-container');
      container.innerHTML = ''; // 一旦リセット
      
      // weatherListには、[ { name: "名古屋", code: "300", min: "21", max: "25", x: 1200, y: 600 }, ... ] のような形でデータを流し込む予定です
    }
  </script>
</body>
</html>
