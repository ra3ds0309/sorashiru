<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる警報注意報</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=700;900&family=Roboto:wght=400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111317;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* 16:9 全面に背景画像を表示 */
    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background-image: url('assets/warning/cover.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 地図レイヤーの絶対配置スタック */
    .map-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 【下層】一次細分区域（コードによる色塗り対象のSVG） */
    #iskt-layer {
      z-index: 1;
    }
    #iskt-layer svg {
      width: 100%;
      height: 100%;
    }
    #iskt-layer path, #iskt-layer polygon {
      fill: rgba(255, 255, 255, 0.05); /* デフォルト（平常時）は薄いグレー */
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 1.2px;
      transition: fill 0.5s ease;
    }

    /* 🎨【上層】都道府県枠線（pref.png を100%x100%でぴったり背景重ね合わせ） */
    #pref-layer {
      z-index: 2;
      pointer-events: none;
      background-image: url('assets/warning/pref.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 📝 コピーライト用の共有CSSスタイル */
    .copyright-tag {
      position: absolute;
      top: 30px;
      right: 40px;
      color: rgba(255, 255, 255, 0.1);
      font-family: 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.03em;
      z-index: 4;
    }
  </style>
</head>
<body>

  <div class="viewport">
    <div class="copyright-tag">© Sorashiru</div>

    <div id="iskt-layer" class="map-layer"></div>
    <div id="pref-layer" class="map-layer"></div>
  </div>

  <script>
    let codeMap = {};        // 警報コード -> { name, color, rank }
    let areaStatusMap = {};   // エリアコード -> 最大警戒情報のオブジェクト

    // キャッシュ対策
    function getCacheBusterUrl(url) {
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}_=${Date.now()}`;
    }

    // 1. 色塗り用SVG地図ファイルを配置
    async function loadMapSVGs() {
      try {
        const isktResponse = await fetch(getCacheBusterUrl('assets/warning/iskt.svg'), { cache: 'no-store' });
        const isktSvgText = await isktResponse.text();
        document.getElementById('iskt-layer').innerHTML = isktSvgText;
        console.log("地図レイヤーの初期配置が完了しました。");
      } catch (e) {
        console.error("SVG地図の読み込みに失敗しました:", e);
      }
    }

    // 2. code.txt の読み込みとパース
    async function loadCodeTable() {
      try {
        const response = await fetch(getCacheBusterUrl('assets/warning/code.txt'), { cache: 'no-store' });
        const text = await response.text();
        const lines = text.split('\n');
        
        lines.forEach(line => {
          line = line.trim();
          if (!line) return;

          const match = line.match(/^([^:]+):([^\[]+)\[#([^\]]+)\]/);
          if (match) {
            const code = match[1].trim();
            const name = match[2].trim();
            let color = match[3].trim();
            
            if (!color.startsWith('#')) {
              color = '#' + color;
            }

            let rank = 0;
            if (name.includes('特別警報') || name.includes('レベル5')) rank = 5;
            else if (name.includes('レベル4')) rank = 4;
            else if (name.includes('警報') || name.includes('レベル3')) rank = 3;
            else if (name.includes('注意報') || name.includes('レベル2')) rank = 2;
            else if (name.includes('早期') || name.includes('レベル1')) rank = 1;
            else if (name.includes('解除')) rank = 0;

            codeMap[code] = { name, color, rank };
          }
        });
      } catch (e) {
        console.error("code.txt の読み込みに失敗しました:", e);
      }
    }

    // 3. 気象庁データをリアルタイムパースして集約（★配列・オブジェクト両対応）
    async function loadWarningData() {
      try {
        const response = await fetch(getCacheBusterUrl('assets/warning/list.txt'), { cache: 'no-store' });
        const text = await response.text();
        const jsonPaths = text.split('\n').map(p => p.trim()).filter(p => p.length > 0);

        const jsonPromises = jsonPaths.map(path => 
          fetch(getCacheBusterUrl(path), { cache: 'no-store' })
            .then(res => res.json())
            .catch(err => {
              console.error(`気象データ取得失敗: ${path}`, err);
              return null;
            })
        );
        const allData = await Promise.all(jsonPromises);

        // 読み込みごとにマップを完全クリア
        areaStatusMap = {};

        allData.forEach(provData => {
          if (!provData) return;
          
          // 【超安全化】配列が来てもオブジェクトが来てもループできるように配列へ統一
          const reports = Array.isArray(provData) ? provData : [provData];
          
          reports.forEach(report => {
            if (!report || !report.areaTypes) return;
            
            report.areaTypes.forEach(type => {
              if (!type.areas) return;
              
              type.areas.forEach(area => {
                const areaCode = area.code; 
                if (!areaCode || !area.warnings) return;

                area.warnings.forEach(warn => {
                  // 「発表」「継続」「切替」の状態のみを色塗りの対象にする
                  if (warn.status === "発表" || warn.status === "継続" || warn.status === "切替") {
                    const meta = codeMap[warn.code];
                    if (meta) {
                      // 既存の登録されているランクより高い場合のみ上書き（最大警戒を保持）
                      const currentMax = areaStatusMap[areaCode] ? areaStatusMap[areaCode].rank : -1;
                      if (meta.rank > currentMax) {
                        areaStatusMap[areaCode] = {
                          rank: meta.rank,
                          color: meta.color,
                          name: meta.name
                        };
                      }
                    }
                  }
                });
              });
            });
          });
        });
      } catch (e) {
        console.error("気象データの取得・解析に失敗しました:", e);
      }
    }

    // 4. 集約したデータを元に、SVGの要素に色を適用
    function applyColorsToSVG() {
      const isktContainer = document.getElementById('iskt-layer');
      if (!isktContainer) return;

      // すべての地域の色を一度初期状態にリセット
      const allPaths = isktContainer.querySelectorAll('path, polygon');
      allPaths.forEach(el => { el.style.fill = ''; });

      // 最新データが残っている地域（現在警報等が出ている地域）だけ色を上書き
      Object.keys(areaStatusMap).forEach(areaCode => {
        const element = document.getElementById(areaCode);
        if (element) {
          element.style.fill = areaStatusMap[areaCode].color;
        }
      });
      console.log("最新の気象情報を地図に同期しました。");
    }

    // メインフロー起動
    window.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([
        loadMapSVGs(),
        loadCodeTable()
      ]);
      await loadWarningData();
      applyColorsToSVG();
    });
  </script>
</body>
</html>
