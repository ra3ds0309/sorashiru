<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる警報注意報</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111317;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* 💡 16:9 全面にタイトル背景画像を表示 */
    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background-image: url('assets/warning/title.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 地図を完全に透明にしてtitle.pngの上に重ねる */
    #map {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      background: transparent; 
      z-index: 1;
    }

    /* UIオーバーレイ（凡例のみ） */
    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      z-index: 2;
      pointer-events: none;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* 下部に寄せる */
    }

    /* 左下凡例 */
    .legend-panel {
      background: rgba(11, 13, 23, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 16px 24px;
      align-self: flex-start;
      backdrop-filter: blur(8px);
    }
    .legend-title { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 8px; font-weight: 700; }
    .legend-items { display: flex; gap: 14px; }
    .legend-box { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; }
    .color-chip { width: 20px; height: 20px; border-radius: 4px; }
    
    /* 防災警戒レベルカラーシステム */
    .c-lvl5 { background: #701a75; border: 1px solid #f472b6; }
    .c-lvl4 { background: #c084fc; }
    .c-lvl3 { background: #ef4444; }
    .c-lvl2 { background: #eab308; }
    .c-lvl1 { background: #64748b; }

    /* Leaflet標準UI（ズームボタン等）を非表示 */
    .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
  </style>
</head>
<body>

  <div class="viewport">
    <div id="map"></div>

    <div class="ui-overlay">
      <div class="legend-panel">
        <div class="legend-title">新基準 警戒レベル</div>
        <div class="legend-items">
          <div class="legend-box"><div class="color-chip c-lvl5"></div><span>レベル5(特別)</span></div>
          <div class="legend-box"><div class="color-chip c-lvl4"></div><span>レベル4(危険)</span></div>
          <div class="legend-box"><div class="color-chip c-lvl3"></div><span>レベル3(警報)</span></div>
          <div class="legend-box"><div class="color-chip c-lvl2"></div><span>レベル2(注意)</span></div>
          <div class="legend-box"><div class="color-chip c-lvl1"></div><span>レベル1(早期)</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 警戒レベルカラーマップ
    const LEVEL_COLORS = {
      5: '#701a75', // レベル5：特別警報
      4: '#c084fc', // レベル4：危険警報
      3: '#ef4444', // レベル3：警報
      2: '#eab308', // レベル2：注意報（今回の濃霧注意報はここになります）
      1: '#64748b', // レベル1：早期注意情報
      0: 'rgba(255, 255, 255, 0.05)' // 発表なし（地図の陸地をうっすら透過させてtitle.pngを見せる）
    };

    let map;
    let codeMap = {};        // 警報コード -> { level, name }
    let areaStatusMap = {};   // エリアコード -> 最大警戒レベル情報

    // 1. code.txt の読み込みとパース
    async function loadCodeTable() {
      try {
        const response = await fetch('assets/warning/code.txt');
        const text = await response.text();
        const lines = text.split('\n');
        
        lines.forEach(line => {
          if (!line.trim()) return;
          const parts = line.split(/[\t,]+/);
          if (parts.length >= 3) {
            const code = parts[0].trim();
            const level = parseInt(parts[1].trim(), 10);
            const name = parts[2].trim();
            codeMap[code] = { level, name };
          }
        });
      } catch (e) {
        console.error("code.txt の読み込みに失敗しました:", e);
      }
    }

    // 2. list.txt にある実際の気象JSONデータをパースして集約
    async function loadWarningData() {
      try {
        const response = await fetch('assets/warning/list.txt');
        const text = await response.text();
        const jsonPaths = text.split('\n').map(p => p.trim()).filter(p => p.length > 0);

        const jsonPromises = jsonPaths.map(path => fetch(path).then(res => res.json()));
        const allData = await Promise.all(jsonPromises);

        allData.forEach(provData => {
          if (!provData.areaTypes) return;
          
          // 💡 送っていただいた気象庁のJSONデータ構造を正確に解析します
          provData.areaTypes.forEach(type => {
            if (!type.areas) return;
            
            type.areas.forEach(area => {
              const areaCode = area.code; // 例: "230010" (愛知県東部) や "2320100" (豊橋市)
              let maxLevel = 0;
              let activeWarningName = "";

              if (area.warnings) {
                area.warnings.forEach(warn => {
                  // statusが「発表」または「継続」のものを対象とする
                  if (warn.status === "発表" || warn.status === "継続") {
                    // code.txtの定義を参照（万が一未定義の場合は注意報レベル2をデフォルトに）
                    const meta = codeMap[warn.code] || { level: 2, name: "注意報" };
                    if (meta.level > maxLevel) {
                      maxLevel = meta.level;
                      activeWarningName = meta.name;
                    }
                  }
                });
              }

              // すでに他のデータで高いレベルが登録されていない場合のみ上書き
              if (maxLevel > 0) {
                if (!areaStatusMap[areaCode] || areaStatusMap[areaCode].level < maxLevel) {
                  areaStatusMap[areaCode] = {
                    level: maxLevel,
                    name: activeWarningName
                  };
                }
              }
            });
          });
        });
        console.log("解析された地域ステータス:", areaStatusMap);
      } catch (e) {
        console.error("気象データの取得・解析に失敗しました:", e);
      }
    }

    // 3. 地図の初期化とTopoJSONマッピング
    async function initAndRenderMap() {
      // 画面を完全に固定（配信画面用）
      // 💡 初期位置を愛知県周辺にクローズアップさせています
      map = L.map('map', {
        zoomControl: false, attributionControl: false, dragging: false,
        scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false, touchZoom: false
      }).setView([35.05, 137.15], 8.8); 

      try {
        // 一次細分区域等（発表単位）のTopoJSON
        const resSubDiv = await fetch('assets/map/一次細分区域等.json');
        const topoSubDiv = await resSubDiv.json();
        const keySubDiv = Object.keys(topoSubDiv.objects)[0];
        const geoSubDiv = topojson.feature(topoSubDiv, topoSubDiv.objects[keySubDiv]);

        // 都道府県等（境界線用）のTopoJSON
        const resPref = await fetch('assets/map/地震情報／都道府県等.json');
        const topoPref = await resPref.json();
        const keyPref = Object.keys(topoPref.objects)[0];
        const geoPref = topojson.feature(topoPref, topoPref.objects[keyPref]);

        // 一次細分区域レイヤーの描画（集約したareaCodeで色塗り）
        const subDivLayer = L.geoJSON(geoSubDiv, {
          style: function(feature) {
            // TopoJSON内のプロパティからコードを取得（code または市町村コードなど）
            const code = feature.properties.code || feature.properties.jmaCode || feature.properties.code_ja || "";
            const status = areaStatusMap[code] || { level: 0 };
            
            return {
              fillColor: LEVEL_COLORS[status.level],
              fillOpacity: status.level > 0 ? 0.85 : 0.1, // 注意報以上は濃く、発表なしは背景を透かす
              color: 'rgba(255, 255, 255, 0.15)',        // 地域ごとの細分境界線
              weight: 1.2
            };
          }
        }).addTo(map);

        // 都道府県の県境をくっきり重ねる
        L.geoJSON(geoPref, {
          style: function() {
            return {
              fillColor: 'transparent',
              color: '#ffffff',
              weight: 1.8,
              opacity: 0.4,
              pointerEvents: 'none'
            };
          }
        }).addTo(map);

        // 💡 全国すべての発表地域を自動で画面に収めたい場合は、以下のコメントアウトを解除してください
        // map.fitBounds(subDivLayer.getBounds(), { padding: [50, 50] });

      } catch (e) {
        console.error("地図レンダリングに失敗しました:", e);
      }
    }

    // メインフロー起動
    window.addEventListener('DOMContentLoaded', async () => {
      await loadCodeTable();     // 1. コードマップの生成
      await loadWarningData();   // 2. リアルタイムJSONの解析
      await initAndRenderMap();  // 3. 地図へのマッピングと表示
    });
  </script>
</body>
</html>
