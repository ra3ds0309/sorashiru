<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる防災気象情報 - 警報・注意報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111317;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      padding: 60px 80px;
      background: radial-gradient(circle at 90% 10%, #1a1f2c 0%, #111317 70%);
    }

    /* ヘッダーエリア */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 40px;
    }
    .title-block h1 {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, #ffffff, #a0aec0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .area-tag {
      font-size: 32px;
      font-weight: 700;
      color: #38bdf8;
      margin-top: 5px;
    }
    .time-tag {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
    }

    /* 警告カードのグリッドレイアウト */
    .warning-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      height: 800px;
      align-content: start;
    }

    /* 各情報カードのスタイル */
    .warning-card {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .info-type {
      font-size: 24px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
    }

    /* 💡 最新の防災気象情報カラーシステム */
    .level-badge {
      font-size: 18px;
      font-weight: 900;
      padding: 6px 14px;
      border-radius: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* レベル5：特別警報 */
    .lvl-5 { background: linear-gradient(135deg, #4c0519, #701a75); color: #fdf2f8; border: 1px solid #f472b6; text-shadow: 0 0 8px rgba(244,114,182,0.6); }
    /* レベル4：危険警報 */
    .lvl-4 { background: #c084fc; color: #1e1b4b; }
    /* レベル3：警報 */
    .lvl-3 { background: #ef4444; color: #ffffff; }
    /* レベル2：注意報 */
    .lvl-2 { background: #eab308; color: #1e1b4b; }
    /* レベル1：早期注意情報 */
    .lvl-1 { background: #64748b; color: #ffffff; }
    
    /* レベル表記なしの特別警報 */
    .sp-alert { background: #f43f5e; color: #ffffff; font-weight: 900; animation: pulse 2s infinite; }

    .current-status {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.3;
      letter-spacing: 0.02em;
      margin-top: 10px;
    }
    
    /* テキストの色をバッジと同期させるための補助クラス */
    .txt-5 { color: #f472b6; }
    .txt-4 { color: #e9d5ff; }
    .txt-3 { color: #fca5a5; }
    .txt-2 { color: #fef08a; }
    .txt-1 { color: #cbd5e1; }

    .copyright {
      position: absolute;
      bottom: 25px;
      right: 80px;
      color: rgba(255, 255, 255, 0.1);
      font-size: 20px;
      letter-spacing: 0.05em;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.8; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="viewport">
    <div class="header">
      <div class="title-block">
        <h1>防災気象情報</h1>
        <div class="area-tag" id="current-area">愛知県 蒲郡市</div>
      </div>
      <div class="time-tag" id="update-time">2026年5月29日 20時40分発表</div>
    </div>

    <!-- 💡 ここに各種警報・注意報が動的に追加されます -->
    <div class="warning-grid" id="warning-container"></div>

    <div class="copyright">© Sorashiru</div>
  </div>

  <script>
    // 💡 リニューアルされた防災気象情報の定義マスターデータ
    const mockActiveWarnings = [
      { type: "大雨", level: 4, name: "大雨危険警報" },
      { type: "河川氾濫", level: 3, name: "氾濫警報" },
      { type: "土砂災害", level: 2, name: "土砂災害注意報" },
      { type: "高潮", level: 1, name: "早期注意情報" },
      { type: "暴風", level: "警報", name: "暴風警報" },
      { type: "雷", level: "注意報", name: "雷注意報" }
    ];

    function renderWarnings(warnings) {
      const container = document.getElementById("warning-container");
      container.innerHTML = "";

      warnings.forEach(warn => {
        const card = document.createElement("div");
        card.className = "warning-card";

        let badgeClass = "";
        let textClass = "";
        let badgeText = "";

        // レベルの数値または文字列に応じてスタイルを設定
        if (typeof warn.level === "number") {
          badgeClass = `lvl-${warn.level}`;
          textClass = `txt-${warn.level}`;
          badgeText = `レベル${warn.level}`;
        } else if (warn.level === "特別警報") {
          badgeClass = "sp-alert";
          badgeText = "特別警報";
        } else if (warn.level === "警報") {
          badgeClass = "lvl-3";
          badgeText = "警報";
        } else {
          badgeClass = "lvl-2";
          badgeText = "注意報";
        }

        card.innerHTML = `
          <div class="card-header">
            <span class="info-type">【${warn.type}】</span>
            <span class="level-badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="current-status ${textClass}">${warn.name}</div>
        `;
        
        container.appendChild(card);
      });
    }

    // 初回レンダリングを実行
    window.addEventListener('DOMContentLoaded', () => {
      renderWarnings(mockActiveWarnings);
    });
  </script>
</body>
</html>
