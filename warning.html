<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>そらしる警報注意報</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111317;
      color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* 💡 16:9 全面に背景画像を表示 */
    .viewport {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background-image: url('assets/warning/cover.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 🗺️ 地図レイヤーの絶対配置スタック（100%×100%で全面に重なるよう修正） */
    .map-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 【下層】一次細分区域（コードによる色塗り対象） */
    #iskt-layer {
      z-index: 1;
    }
    #iskt-layer svg {
      width: 100%;
      height: 100%;
    }
    #iskt-layer path, #iskt-layer polygon {
      fill: rgba(255, 255, 255, 0.05); /* デフォルト（発表なし・平常時）は薄いグレー */
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 1.2px;
      transition: fill 0.5s ease;      /* 色が変わるときにじんわり変化 */
    }

    /* 【上層】都道府県枠線（最前面に重ねる白線） */
    #pref-layer {
      z-index: 2;
      pointer-events: none; /* マウスイベントなどを透過 */
    }
    #pref-layer svg {
      width: 100%;
      height: 100%;
    }
    #pref-layer path, #pref-layer polygon {
      fill: none !important; /* 塗りつぶしは絶対に透明 */
      stroke: #ffffff;       /* くっきりした白い県境線 */
      stroke-width: 1.8px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div class="viewport">
    <div id="iskt-layer" class="map-layer"></div>
    <div id="pref-layer" class="map-layer"></div>
  </div>

  <script>
    let codeMap = {};        // 警報コード -> { name, color, rank }
    let areaStatusMap = {};   // エリアコード -> 最大警戒情報のオブジェクト

    // ⚡【キャッシュ対策】URLの末尾にタイムスタンプを付与してブラウザキャッシュを強制破壊する関数
    function getCacheBusterUrl(url) {
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}_=${Date.now()}`;
    }

    // 1. 各種SVGファイルを非同期で読み込んでレイヤーに流し込む
    async function loadMapSVGs() {
      try {
        const isktResponse = await fetch(getCacheBusterUrl('assets/warning/iskt.svg'), { cache: 'no-store' });
        const isktSvgText = await isktResponse.text();
        document.getElementById('iskt-layer').innerHTML = isktSvgText;

        const prefResponse = await fetch(getCacheBusterUrl('assets/warning/pref.svg'), { cache: 'no-store' });
        const prefSvgText = await prefResponse.text();
        document.getElementById('pref-layer').innerHTML = prefSvgText;

        console.log("SVG地図の読み込み・配置が完了しました");
      } catch (e) {
        console.error("SVG地図の読み込みに失敗しました:", e);
      }
    }

    // 2. code.txt の読み込みとパース
    async function loadCodeTable() {
      try {
        const response = await fetch(getCacheBusterUrl('assets/warning/code.txt'), { cache: 'no-store' });
        const text = await response.text();
        const lines = text.split('\n');
        
        lines.forEach(line => {
          line = line.trim();
          if (!line) return;

          const match = line.match(/^([^:]+):([^\[]+)\[#([^\]]+)\]/);
          if (match) {
            const code = match[1].trim();
            const name = match[2].trim();
            let color = match[3].trim();
            
            if (!color.startsWith('#')) {
              color = '#' + color;
            }

            let rank = 0;
            if (name.includes('特別警報') || name.includes('レベル5')) rank = 5;
            else if (name.includes('レベル4')) rank = 4;
            else if (name.includes('警報') || name.includes('レベル3')) rank = 3;
            else if (name.includes('注意報') || name.includes('レベル2')) rank = 2;
            else if (name.includes('早期') || name.includes('レベル1')) rank = 1;
            else if (name.includes('解除')) rank = 0;

            codeMap[code] = { name, color, rank };
          }
        });
      } catch (e) {
        console.error("code.txt の読み込みに失敗しました:", e);
      }
    }

    // 3. list.txt にある気象庁JSONデータをリアルタイム巡回パースして集約
    async function loadWarningData() {
      try {
        const response = await fetch(getCacheBusterUrl('assets/warning/list.txt'), { cache: 'no-store' });
        const text = await response.text();
        const jsonPaths = text.split('\n').map(p => p.trim()).filter(p => p.length > 0);

        // すべてのフェッチに cache: 'no-store' と タイムスタンプを適用して完全リアルタイム化
        const jsonPromises = jsonPaths.map(path => 
          fetch(getCacheBusterUrl(path), { cache: 'no-store' })
            .then(res => res.json())
            .catch(err => {
              console.error(`気象データ取得失敗: ${path}`, err);
              return null;
            })
        );
        const allData = await Promise.all(jsonPromises);

        // 読み込みごとにマップを完全クリア
        areaStatusMap = {};

        allData.forEach(provData => {
          if (!provData || !provData.areaTypes) return;
          
          provData.areaTypes.forEach(type => {
            if (!type.areas) return;
            
            type.areas.forEach(area => {
              const areaCode = area.code; 
              let maxRank = -1;
              let highestWarning = null;

              if (area.warnings) {
                area.warnings.forEach(warn => {
                  // 「発表」「継続」に加え、警報から注意報への「切替」タイミングも確実にキャッチ
                  if (warn.status === "発表" || warn.status === "継続" || warn.status === "切替") {
                    const meta = codeMap[warn.code];
                    if (meta) {
                      if (meta.rank > maxRank) {
                        maxRank = meta.rank;
                        highestWarning = meta;
                      }
                    }
                  }
                });
              }

              if (maxRank >= 0 && highestWarning) {
                if (!areaStatusMap[areaCode] || areaStatusMap[areaCode].rank < maxRank) {
                  areaStatusMap[areaCode] = {
                    rank: maxRank,
                    color: highestWarning.color,
                    name: highestWarning.name
                  };
                }
              }
            });
          });
        });
      } catch (e) {
        console.error("気象データの取得・解析に失敗しました:", e);
      }
    }

    // 4. 集約したデータを元に、SVGの要素に色を適用する
    function applyColorsToSVG() {
      const isktContainer = document.getElementById('iskt-layer');
      if (!isktContainer) return;

      // 🛠️【データの食い違い対策の核心】
      // 新しく色を塗る前に、一度すべての地域（path, polygon）のインライン fill を完全にリセットします。
      // これにより、データから注意報が消えた（平常時に戻った）地域が、古い色のまま居座るのを防ぎ、
      // CSSで設定したデフォルトの薄いグレー（rgba(255,255,255,0.05)）に綺麗に戻るようになります。
      const allPaths = isktContainer.querySelectorAll('path, polygon');
      allPaths.forEach(el => {
        el.style.fill = ''; 
      });

      // 現在発表されている地域のみ、最新データの色で上書き着色
      Object.keys(areaStatusMap).forEach(areaCode => {
        const element = document.getElementById(areaCode);
        if (element) {
          const status = areaStatusMap[areaCode];
          element.style.fill = status.color;
        }
      });
      console.log("最新の気象情報を地図に反映しました。");
    }

    // メインフロー起動
    window.addEventListener('DOMContentLoaded', async () => {
      // SVGとコードテーブルのパースを並列実行
      await Promise.all([
        loadMapSVGs(),
        loadCodeTable()
      ]);
      
      // リアルタイムデータの取得と色塗り
      await loadWarningData();
      applyColorsToSVG();
    });
  </script>
</body>
</html>
